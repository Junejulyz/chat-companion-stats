<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分享卡片实验室 - 现代简约风 (Modern Light Playground)</title>
    <style>
        @import url("https://fontsapi.zeoseven.com/19/main/result.css");

        :root {
            --bg-color: #F7F9FB;
            --header-bg: transparent;
            --content-bg: #EFF2F4;
            /* Figma: #eff2f4 */
            --stat-box-bg: #F7F9FB;
            /* Figma: #f7f9fb */
            --text-main: #131313;
            /* Figma: #131313 */
            --text-muted: #666666;
            --card-width: 663px;
            --card-height: 730px;
            --card-border-radius: 16px;
            /* Figma: 16px */
            --font-main: "LXGW Neo XiHei", "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background-color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: var(--font-main);
        }

        .card {
            width: var(--card-width);
            height: var(--card-height);
            background-color: var(--bg-color);
            border-radius: var(--card-border-radius);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            padding-bottom: 32px;
            /* Figma: pb-32 */
        }

        .header {
            height: 214px;
            background-color: transparent;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 40px;
            position: relative;
        }

        .avatars-container {
            display: flex;
            align-items: center;
            position: relative;
            margin-right: 30px;
            z-index: 2;
        }

        /* 头像容器：负责外层 6px 灰色边框 */
        .avatar-frame {
            position: relative;
            width: 124px;
            /* 100 + 6*2(inner) + 6*2(outer) ? No, user said image+inner is 6px. */
            height: 124px;
            background: rgba(220, 221, 220, 1);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .avatar-frame:first-child {
            z-index: 2;
        }

        .avatar-frame:last-child {
            z-index: 1;
            margin-left: -52px;
            /* Overlap adjustment */
        }

        /* 内层：负责 6px 渐变边框和投影 */
        .avatar-inner {
            width: 100px;
            /* 100 + 6*2 */
            height: 100px;
            border-radius: 50%;
            padding: 6px;
            /* 渐变边框：上深灰到下黑 */
            background: linear-gradient(to bottom, #444, #000);
            /* 阴影：覆盖在外面那层灰色 border 上 */
            /*box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.4);*/
            box-shadow: 0 12px 18px 2px rgba(175, 183, 188, 0.80);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .avatar-inner img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            background-color: #ddd;
        }

        .header-text {
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: absolute;
            left: 278px;
            top: 50%;
            transform: translateY(-50%);
        }

        .char-name {
            font-size: 28px;
            font-weight: 300;
            color: var(--text-main);
        }

        .encounter-info {
            font-size: 22px;
            color: var(--text-muted);
            font-weight: 300;
        }

        .encounter-info b {
            font-weight: 700;
            color: var(--text-main);
        }

        .content {
            background-image: url('mesh-bg.svg');
            background-size: cover;
            background-position: center;
            background-color: var(--content-bg);
            margin: 0 32px;
            border-radius: 24px;
            /* Figma bottom rounded-24 */
            padding: 40px;
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 519px;
            align-self: center;
        }

        .stats-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .stat-box {
            height: 80px;
            background-color: var(--stat-box-bg);
            border-radius: 24px;
            /* Figma rounded-24 */
            box-shadow: 0px 12px 24px 0px rgba(218, 227, 232, 0.6);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 32px;
            /* Figma px-32 */
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 24px;
            font-weight: normal;
        }

        .stat-value-group {
            display: flex;
            align-items: baseline;
            gap: 6px;
        }

        .stat-value {
            color: var(--text-main);
            font-size: 24px;
            font-weight: bold;
        }

        .stat-unit {
            color: var(--text-muted);
            font-size: 20px;
            font-weight: 300;
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="header">
            <div class="avatars-container">
                <!-- User Avatar Frame -->
                <div class="avatar-frame">
                    <div class="avatar-inner">
                        <img src="https://via.placeholder.com/100" alt="User">
                    </div>
                </div>
                <!-- Character Avatar Frame -->
                <div class="avatar-frame">
                    <div class="avatar-inner">
                        <img src="https://via.placeholder.com/100" alt="Character">
                    </div>
                </div>
            </div>
            <div class="header-text">
                <div class="char-name">角色姓名</div>
                <div class="encounter-info">初遇于 <b>2025</b> 年 <b>3</b> 月 <b>15</b> 日 <b>18:53</b></div>
            </div>
        </div>

        <div class="content">
            <div class="stats-list">
                <div class="stat-box">
                    <div class="stat-label">聊天对话</div>
                    <div class="stat-value-group">
                        <span class="stat-value">27</span><span class="stat-unit">条</span>
                    </div>
                </div>

                <div class="stat-box">
                    <div class="stat-label">相伴天数</div>
                    <div class="stat-value-group">
                        <span class="stat-value">68</span><span class="stat-unit">天</span>
                    </div>
                </div>

                <div class="stat-box">
                    <div class="stat-label">聊天字数</div>
                    <div class="stat-value-group">
                        <span class="stat-value">12789</span><span class="stat-unit">字</span>
                    </div>
                </div>

                <div class="stat-box">
                    <div class="stat-label">回忆大小</div>
                    <div class="stat-value-group">
                        <span class="stat-value">189.73</span><span class="stat-unit">B</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        /* ... existing styles ... */

        .loading-preview {
            position: relative;
            min-height: 200px;
            /* Ensure there's space for the loader even if no image yet */
        }

        .loading-preview::after {
            content: "正在生成卡片...";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            color: #333;
            border-radius: 5px;
            z-index: 10;
        }
    </style>
</body>

</html>
