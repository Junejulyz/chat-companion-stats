<div class="example-extension-settings">
  <div class="inline-drawer">
    <div class="inline-drawer-toggle inline-drawer-header">
      <b>羁绊助手</b>
      <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
    </div>
    <div class="inline-drawer-content">
      <div class="example-extension_block">
        <div class="ccs-stats-container">
          <div class="ccs-stat-item" style="display: flex; align-items: center;">
            <span class="ccs-stat-label">角色：</span>
            <span class="ccs-stat-value" id="ccs-character" style="flex-grow: 1;">未知</span>
            <input id="ccs-refresh" type="button" class="menu_button ccs-btn-secondary" value="刷新" style="padding: 2px 6px; font-size: 0.85em; width: auto; margin-left: auto; height: 26px;" />
          </div>
          <div class="ccs-stat-item ccs-share-option">
            <input type="checkbox" id="ccs-share-start" checked>
            <label for="ccs-share-start" class="ccs-stat-label">初遇：</label>
            <span class="ccs-stat-value" id="ccs-start">尚未互动</span>
          </div>
          <div class="ccs-stat-item ccs-share-option">
            <input type="checkbox" id="ccs-share-messages" checked>
            <label for="ccs-share-messages" class="ccs-stat-label">对话：</label>
            <span class="ccs-stat-value" id="ccs-messages">0</span>
            <span class="ccs-stat-label">条</span>
          </div>
          <div class="ccs-stat-item ccs-share-option">
            <input type="checkbox" id="ccs-share-words" checked>
            <label for="ccs-share-words" class="ccs-stat-label">字数：</label>
            <span class="ccs-stat-value" id="ccs-words">0</span>
            <span class="ccs-stat-label">字</span>
          </div>
          <div class="ccs-stat-item ccs-share-option">
            <input type="checkbox" id="ccs-share-days" checked>
            <label for="ccs-share-days" class="ccs-stat-label">相伴：</label>
            <span class="ccs-stat-value" id="ccs-days">0</span>
            <span class="ccs-stat-label">天</span>
          </div>
          <div class="ccs-stat-item ccs-share-option">
            <input type="checkbox" id="ccs-share-size" checked> <!-- New checkbox -->
            <label for="ccs-share-size" class="ccs-stat-label">回忆大小：</label> <!-- Changed label again -->
            <span class="ccs-stat-value" id="ccs-total-size">--</span> <!-- New value span -->
          </div>
          <!-- New User Avatar Checkbox -->
          <div class="ccs-stat-item ccs-share-option">
            <input type="checkbox" id="ccs-share-user-avatar" checked>
            <label for="ccs-share-user-avatar" class="ccs-stat-label">用户头像</label>
          </div>
          <div class="ccs-tip" id="ccs-tip" style="display: none;">
            <span class="ccs-tip-icon">💡</span>
            <span class="ccs-tip-text">字数是根据当前对话和历史记录估算的，误差较大，仅供参考。</span>
          </div>
        </div>
        <div class="ccs-actions-group">
          <div class="ccs-primary-actions">
            <input id="ccs-view-more" type="button" class="menu_button ccs-btn-secondary" value="查看更多" />
            <input id="ccs-share" type="button" class="menu_button ccs-btn-secondary" value="生成卡片" />
          </div>
          <input id="ccs-global-stats" type="button" class="menu_button ccs-btn-secondary" value="全局羁绊排行" />
        </div>
        <!-- 用于生成分享图片的隐藏canvas -->
        <canvas id="ccs-canvas" style="display: none;"></canvas>
      </div>
    </div>
  </div>
  <!-- 预览模态框 -->
  <div id="ccs-preview-modal">
    <div>
      <div class="ccs-carousel-container">
        <div id="ccs-carousel-prev" class="ccs-carousel-btn"><i class="fa-solid fa-chevron-left"></i></div>
        <div class="ccs-preview-wrapper">
          <div id="ccs-preview-container"></div>
          <div id="ccs-carousel-dots" class="ccs-carousel-dots"></div>
        </div>
        <div id="ccs-carousel-next" class="ccs-carousel-btn"><i class="fa-solid fa-chevron-right"></i></div>
      </div>
      <div class="button-container">
        <select id="ccs-style-select" class="menu_button">
          <option value="modern-light">简约日间</option>
          <option value="modern-dark">简约夜间</option>
          <option value="ins">ins风</option>
          <option value="pixel-pink">粉色像素</option>
          <option value="pocket-sticker">口袋贴纸粉</option>
          <option value="pocket-sticker-blue">口袋贴纸蓝</option>
          <option value="ancient">青纹信笺</option>
        </select>
        <input id="ccs-download" type="button" class="menu_button" value="保存图片" />
        <input id="ccs-cancel" type="button" class="menu_button" value="取消" />
      </div>
    </div>
  </div>
  
  <!-- 全局羁绊模态框 (完全独立) -->
  <div id="ccs-global-modal" style="display: none;">
    <div class="ccs-global-modal-content">
      <div class="ccs-global-header">
        <div class="ccs-global-title"><i class="fa-solid fa-crown ccs-global-title-icon"></i>羁绊排行</div>
        <div class="ccs-global-actions">
          <i id="ccs-global-share-btn" class="fa-solid fa-arrow-up-from-bracket ccs-global-icon-btn" title="分享排行榜"></i>
          <i id="ccs-global-close" class="fa-solid fa-xmark ccs-global-icon-btn" title="关闭"></i>
        </div>
      </div>
      <div class="ccs-global-tabs">
        <div class="ccs-tab active" data-tab="messages">对话总数</div>
        <div class="ccs-tab" data-tab="days">相伴天数</div>
        <div class="ccs-tab" data-tab="size">回忆大小</div>
      </div>
      <div id="ccs-global-spinner" class="ccs-global-spinner" style="display: none;">
        <i class="fa-solid fa-spinner fa-spin"></i> 正在读取回忆...
      </div>
      <div id="ccs-global-list">
        <!-- 列表内容动态生成 -->
      </div>
    </div>
  </div>

  <!-- 高级统计模态框 -->
  <div id="ccs-advanced-modal" style="display: none;">
    <div class="ccs-advanced-modal-content">
      <div class="ccs-advanced-header">
        <div class="ccs-advanced-title"><i class="fa-solid fa-chart-line ccs-advanced-title-icon"></i> <span id="ccs-advanced-character-name">详细统计</span></div>
        <div class="ccs-advanced-actions">
          <i id="ccs-advanced-close" class="fa-solid fa-xmark ccs-advanced-icon-btn" title="关闭"></i>
        </div>
      </div>
      <div class="ccs-advanced-body">
        <div id="ccs-advanced-loading" style="display: none; text-align: center; padding: 20px;">
          <i class="fa-solid fa-spinner fa-spin"></i> <span id="ccs-advanced-progress-text">正在分析回忆...</span>
          <div style="width: 100%; height: 4px; background: rgba(128,128,128,0.2); border-radius: 2px; margin-top: 10px; overflow: hidden;">
            <div id="ccs-advanced-progress-bar" style="width: 0%; height: 100%; background: var(--SmartThemeEmColor); transition: width 0.3s linear;"></div>
          </div>
        </div>
        <div id="ccs-advanced-content">
          <div class="ccs-advanced-section">
            <div class="ccs-advanced-item">
              <div class="ccs-advanced-label">今日对话</div>
              <div class="ccs-advanced-value" id="ccs-today-messages">0 <span class="ccs-advanced-unit">条</span></div>
            </div>
            <div class="ccs-advanced-item">
              <div class="ccs-advanced-label">最高连聊记录</div>
              <div class="ccs-advanced-value" id="ccs-longest-streak">0 <span class="ccs-advanced-unit">天</span></div>
            </div>
          </div>
          <div class="ccs-advanced-card">
            <div class="ccs-advanced-card-label">聊得最嗨的一天</div>
            <div class="ccs-advanced-card-date" id="ccs-peak-date">--</div>
            <div class="ccs-advanced-card-count" id="ccs-peak-count">0 <span class="ccs-advanced-unit">条消息</span></div>
          </div>
        </div>
        <div id="ccs-advanced-error" style="display: none; text-align: center; padding: 20px; color: var(--SmartThemeErrorColor);">
          当前数据量过大或没有互动，无法计算详细统计。
        </div>
      </div>
    </div>
  </div>
</div>
